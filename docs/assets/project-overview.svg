<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Walmart Holiday Sales Decision Science verified project overview</title>
  <desc id="desc">Summary of dataset size, holiday lift, statistical correction, forecast performance and controlled pilot recommendation.</desc>
  <rect width="1200" height="520" fill="#EEF1F4"/>
  <rect x="30" y="28" width="1140" height="84" rx="10" fill="#0B1D33"/>
  <rect x="55" y="55" width="13" height="13" rx="3" fill="#C97F0A"/>
  <text x="84" y="66" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Walmart Holiday Sales Decision Science</text>
  <text x="84" y="91" fill="#9FB2C4" font-family="Arial, sans-serif" font-size="15">VERIFIED ANALYTICS  /  RETAIL DECISION SUPPORT  /  2010-2012</text>

  <g font-family="Arial, sans-serif">
    <rect x="30" y="134" width="270" height="132" rx="9" fill="#FFFFFF" stroke="#DAE0E6"/>
    <text x="52" y="164" fill="#51606F" font-size="13" font-weight="700">DATASET</text>
    <text x="52" y="211" fill="#0B1D33" font-size="34" font-weight="700">6,435</text>
    <text x="178" y="211" fill="#0E7C7B" font-size="18" font-weight="700">store-weeks</text>
    <text x="52" y="239" fill="#51606F" font-size="15">45 stores  |  143 weeks</text>

    <rect x="320" y="134" width="270" height="132" rx="9" fill="#FFFFFF" stroke="#DAE0E6"/>
    <text x="342" y="164" fill="#51606F" font-size="13" font-weight="700">OVERALL ASSOCIATION</text>
    <text x="342" y="211" fill="#0E7C7B" font-size="34" font-weight="700">+7.84%</text>
    <text x="342" y="239" fill="#51606F" font-size="15">95% CI: 2.08% to 13.67%</text>

    <rect x="610" y="134" width="270" height="132" rx="9" fill="#FFFFFF" stroke="#DAE0E6"/>
    <text x="632" y="164" fill="#51606F" font-size="13" font-weight="700">MULTIPLE TESTING</text>
    <text x="632" y="211" fill="#C97F0A" font-size="34" font-weight="700">7 nominal</text>
    <text x="632" y="239" fill="#51606F" font-size="15">0 survive FDR / Bonferroni</text>

    <rect x="900" y="134" width="270" height="132" rx="9" fill="#FFFFFF" stroke="#DAE0E6"/>
    <text x="922" y="164" fill="#51606F" font-size="13" font-weight="700">AGGREGATE FORECAST</text>
    <text x="922" y="211" fill="#0E7C7B" font-size="34" font-weight="700">1.87%</text>
    <text x="1032" y="211" fill="#0B1D33" font-size="18" font-weight="700">MAPE</text>
    <text x="922" y="239" fill="#51606F" font-size="15">20-week chronological holdout</text>

    <rect x="30" y="288" width="1140" height="202" rx="10" fill="#FFFFFF" stroke="#DAE0E6"/>
    <text x="56" y="323" fill="#0B1D33" font-size="18" font-weight="700">Evidence-to-decision path</text>

    <rect x="56" y="350" width="185" height="82" rx="8" fill="#E3F1F0"/>
    <text x="149" y="381" text-anchor="middle" fill="#0E7C7B" font-size="16" font-weight="700">SQL + QA</text>
    <text x="149" y="407" text-anchor="middle" fill="#51606F" font-size="13">governed data layer</text>
    <path d="M245 391 H300" stroke="#9FB2C4" stroke-width="3"/>
    <path d="M292 384 L302 391 L292 398" fill="none" stroke="#9FB2C4" stroke-width="3"/>

    <rect x="306" y="350" width="210" height="82" rx="8" fill="#E3F1F0"/>
    <text x="411" y="381" text-anchor="middle" fill="#0E7C7B" font-size="16" font-weight="700">Statistical rigor</text>
    <text x="411" y="407" text-anchor="middle" fill="#51606F" font-size="13">CI, robust OLS, FDR</text>
    <path d="M520 391 H575" stroke="#9FB2C4" stroke-width="3"/>
    <path d="M567 384 L577 391 L567 398" fill="none" stroke="#9FB2C4" stroke-width="3"/>

    <rect x="581" y="350" width="210" height="82" rx="8" fill="#E3F1F0"/>
    <text x="686" y="381" text-anchor="middle" fill="#0E7C7B" font-size="16" font-weight="700">Forecast evaluation</text>
    <text x="686" y="407" text-anchor="middle" fill="#51606F" font-size="13">baseline vs feature OLS</text>
    <path d="M795 391 H850" stroke="#9FB2C4" stroke-width="3"/>
    <path d="M842 384 L852 391 L842 398" fill="none" stroke="#9FB2C4" stroke-width="3"/>

    <rect x="856" y="350" width="288" height="82" rx="8" fill="#FBF0DD" stroke="#C97F0A"/>
    <text x="1000" y="381" text-anchor="middle" fill="#C97F0A" font-size="16" font-weight="700">Controlled Store 7 pilot</text>
    <text x="1000" y="407" text-anchor="middle" fill="#51606F" font-size="13">experiment, not automatic rollout</text>

    <text x="56" y="465" fill="#51606F" font-size="13">Every metric is generated by the pipeline and covered by automated or independent QA.</text>
  </g>
</svg>
